{% if editing == true then %}
<div class="module-add" >
    <div class="btn-group" id="text-editor_heading">
        <button type="button" class="module-add-btn dropdown-toggle" data-toggle="dropdown" aria-haspopup="true" aria-expanded="false">
            <span class="icon-plus"></span>
        </button>

        <ul class="dropdown-menu">
          {% for modkey, modhtml in pairs(_G.MODULES) do %}
            <li>{* modkey *}</li>
          {% end %}
        </ul>
    </div>
</div>
{% end %}
