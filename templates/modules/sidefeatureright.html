        <div class="col-md-6">
            <div class="image-text editable painttext paint-area paint-area--text">
                {*inputtext*}
            </div>
        </div>
        <div class="image-editor col-md-6 container">
            {*inputmediaset*}
        </div>
    </div>
</div>
